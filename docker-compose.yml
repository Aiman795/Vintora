services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_PYTHON_URL: /ai
        VITE_TRYON_URL: /tryon
        VITE_SOCKET_URL: ""
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
      - python-service
      - tryon-service
    restart: unless-stopped

  backend:
    build:
      context: ./server
    environment:
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vintora}
      JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      PYTHON_SERVICE_URL: http://python-service:8000
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      ADMIN_INVITE_CODE: ${ADMIN_INVITE_CODE:-vintora-admin}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  python-service:
    build:
      context: ./python-service
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/vintora}
      SERVER_UPLOADS_DIR: /shared/uploads
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - server_uploads:/shared/uploads:ro
    depends_on:
      - mongo
    restart: unless-stopped

  tryon-service:
    build:
      context: ./tryon-service
    environment:
      USE_EXTERNAL_TRYON: ${USE_EXTERNAL_TRYON:-false}
    volumes:
      - tryon_data:/app/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    restart: unless-stopped

volumes:
  mongo_data:
  server_uploads:
  tryon_data:

